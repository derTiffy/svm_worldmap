<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Karte erstellen
  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -2
  });

  // Kartenrahmen (Maße)
  var bounds = [[0,0], [9716,11212]];



  // Kartenbild
  L.imageOverlay(
  "https://drive.google.com/uc?export=view&id=1RIf4qzz4r2HtjfR_boJsVkiQY4olmhAK",
  bounds
  ).addTo(map);

  map.fitBounds(bounds);

  // Test-Pin
  L.marker([500, 500]).addTo(map)
    .bindPopup("Test-Ort: Zentrum der Welt")
    .openPopup();
</script>

</body>
</html>

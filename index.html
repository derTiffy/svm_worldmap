<!DOCTYPE html>

<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* 🔍 SUCHFELD */
    #searchBox {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 300px;
    }

    #searchInput {
      width: 100%;
      padding: 8px;
      font-size: 14px;
    }

    #suggestions {
      background: white;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ccc;
    }

    .suggestion-item {
      padding: 6px;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background: #eee;
    }

  </style>

</head>

<body>

<div id="searchBox">
  <input id="searchInput" type="text" placeholder="Ort suchen..." />
  <div id="suggestions"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3,
    maxZoom: 5,
    zoomSnap: 0.25
  });

  var imageUrl = "https://lh3.googleusercontent.com/d/1RIf4qzz4r2HtjfR_boJsVkiQY4olmhAK=s11212?authuser=0";

  var w = 11212;
  var h = 9716;

  var bounds = [[0, 0], [h, w]];

  L.imageOverlay(imageUrl, bounds).addTo(map);

  map.fitBounds(bounds);
  map.setZoom(-2);

  map.setMaxBounds(bounds);

  // 🧭 Koordinatenanzeige
  var coordBox = L.control({position: 'bottomleft'});

  coordBox.onAdd = function () {
    this._div = L.DomUtil.create('div', 'coordBox');
    this._div.style.background = "rgba(0,0,0,0.7)";
    this._div.style.color = "white";
    this._div.style.padding = "6px 10px";
    this._div.innerHTML = "Klick auf die Karte";
    return this._div;
  };

  coordBox.addTo(map);

  map.on('click', function(e) {
    var x = Math.round(e.latlng.lng);
    var y = Math.round(e.latlng.lat);

    coordBox._div.innerHTML =
      "X: " + x + " | Y: " + y;
  });

  // =========================
  // 📡 DATEN + MARKER
  // =========================

  const sheetURL = "HIER_DEINE_SCRIPT_URL";

  let allMarkers = [];

  fetch(sheetURL)
    .then(res => res.json())
    .then(data => {

      console.log(data); // Debug

      data.forEach(row => {

        // ✅ FIX: erkennt TRUE egal ob Boolean oder String
        if (String(row.Approved).toLowerCase() !== "true") return;

        const name = row.Name;
        const x = parseFloat(row.X);
        const y = parseFloat(row.Y);
        const beschreibung = row.Beschreibung;
        const wiki = row.Wiki;

        if (!name || isNaN(x) || isNaN(y)) return;

        let popupContent = `<b>${name}</b><br>${beschreibung || ""}`;

        if (wiki) {
          popupContent += `<br><a href="${wiki}" target="_blank">Wiki öffnen</a>`;
        }

        const marker = L.marker([y, x]).addTo(map)
          .bindPopup(popupContent);

        allMarkers.push({
          name: name,
          marker: marker,
          x: x,
          y: y
        });

      });

    });

  // =========================
  // 🔍 SUCHE + AUTOCOMPLETE
  // =========================

  const input = document.getElementById("searchInput");
  const suggestions = document.getElementById("suggestions");

  input.addEventListener("input", function() {
    const value = input.value.toLowerCase();
    suggestions.innerHTML = "";

    if (!value) return;

    const matches = allMarkers.filter(m =>
      m.name.toLowerCase().includes(value)
    );

    matches.slice(0, 10).forEach(m => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.textContent = m.name;

      div.onclick = () => {
        map.setView([m.y, m.x], 1);
        m.marker.openPopup();
        suggestions.innerHTML = "";
        input.value = m.name;
      };

      suggestions.appendChild(div);
    });
  });

</script>

</body>
</html>

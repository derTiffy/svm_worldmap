<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #searchBox {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 300px;
    }

    #searchInput {
      width: 100%;
      padding: 8px;
      font-size: 14px;
    }

    #suggestions {
      background: white;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ccc;
    }

    .suggestion-item {
      padding: 6px;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background: #eee;
    }

    #infoBox {
      margin-top: 5px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      font-size: 13px;
    }

    #measureBox {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 8px;
      font-size: 14px;
      display: none;
    }

    #toolBox {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.8);
      padding: 6px;
      border-radius: 6px;
    }

    #toolBox button {
      display: block;
      width: 140px;
      margin: 4px 0;
      padding: 6px;
      cursor: pointer;
      border: none;
      color: white;
      background: #444;
    }

    #toolBox button.active {
      background: #4da3ff;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="searchBox">
  <input id="searchInput" type="text" placeholder="Ort suchen..." />
  <div id="suggestions"></div>
  <div id="infoBox">Bereit</div>
</div>

<div id="measureBox"></div>

<div id="toolBox">
  <button id="modeCoords" class="active">Koordinaten</button>
  <button id="modeMeasure">Messen</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -3,
  maxZoom: 5,
  zoomSnap: 0.25
});

var imageUrl = "https://lh3.googleusercontent.com/d/1RIf4qzz4r2HtjfR_boJsVkiQY4olmhAK=s11212?authuser=0";

var w = 11212;
var h = 9716;
var bounds = [[0, 0], [h, w]];

L.imageOverlay(imageUrl, bounds).addTo(map);
map.fitBounds(bounds);
map.setZoom(-2);
map.setMaxBounds(bounds);

// =========================
// 📍 MARKER ICON SYSTEM (NO SHADOW)
// =========================

const BASE_SIZE = 32;

function createIcon(size) {
  return L.icon({
    iconUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
    iconSize: [size, size * 1.5],
    iconAnchor: [size / 2, size * 1.5],
    popupAnchor: [0, -size]
  });
}

function getScaledSize() {
  const zoom = map.getZoom();

  const minZoom = -3;
  const maxZoom = 1;

  const t = Math.min(1, Math.max(0, (zoom - minZoom) / (maxZoom - minZoom)));

  return BASE_SIZE * (0.5 + 0.5 * t);
}

function updateMarkerSize() {
  const size = getScaledSize();

  allMarkers.forEach(m => {
    m.marker.setIcon(createIcon(size));
  });
}

map.on("zoomend", updateMarkerSize);

// =========================
// 📡 GOOGLE SHEET
// =========================

const sheetURL = "https://script.google.com/macros/s/AKfycbwGaaBeERsd4o-nj-aCABwaLsVMEEmuh8ou_-mHJVs33MeXwzgdTC94A0bvNuFXwcKhCQ/exec";

let allMarkers = [];

fetch(sheetURL)
.then(res => res.json())
.then(data => {

  data.forEach(row => {

    if (String(row.Approved).toLowerCase() !== "true") return;

    const name = row.Name;
    const x = parseFloat(row.X);
    const y = parseFloat(row.Y);
    const beschreibung = row.Beschreibung;
    const wiki = row.Wiki;

    if (!name || isNaN(x) || isNaN(y)) return;

    let popup = `<b>${name}</b><br>${beschreibung || ""}`;

    if (wiki) {
      popup += `<br><a href="${wiki}" target="_blank">Wiki öffnen</a>`;
    }

    const marker = L.marker([y, x], {
      icon: createIcon(BASE_SIZE)
    }).addTo(map).bindPopup(popup);

    allMarkers.push({ name, marker, x, y });

  });

  updateMarkerSize();
});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SVM Worldmap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&display=swap" rel="stylesheet">

<style>

html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#000;
  font-family:"Eagle Lake", serif;
}

#map {
  height:100vh;
  width:100%;
}

/* ================= UI BASIS ================= */

.ui-box {
  position:absolute;
  z-index:1000;
  background:rgba(0,0,0,0.75);
  border-radius:8px;
  padding:8px;
  color:white;
}

/* ================= SUCHE ================= */

#searchBox {
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
}

#searchInput {
  width:100%;
  padding:6px;
  border:none;
}

#suggestions {
  background:white;
  color:black;
  max-height:150px;
  overflow-y:auto;
}

/* ================= TOOLS ================= */

#toolBox {
  top:10px;
  right:10px;
}

#toolBox button {
  display:block;
  margin:4px 0;
}

/* ================= MAP SWITCH ================= */

#mapSwitcher {
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
}

#mapSwitcher button.active {
  background:#4da3ff;
  color:black;
}

/* ================= BUTTONS ================= */

button {
  background:#444;
  color:white;
  border:none;
  padding:6px 10px;
  cursor:pointer;
}

button:hover {
  background:#666;
}

/* ================= LEGENDE ================= */

.leaflet-control.legend-control {
  background:rgba(0,0,0,0.75);
  padding:10px;
  border-radius:8px;
  color:white;
  font-size:16px;
  line-height:24px;
  max-width:250px;
}

.legend-item {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:6px;
}

.legend-icon img {
  width:26px;
  height:26px;
}

</style>
</head>

<body>

<div id="searchBox" class="ui-box">
<input id="searchInput" placeholder="Ort suchen..." />
<div id="suggestions"></div>
</div>

<div id="toolBox" class="ui-box">
<button id="modeCoords" class="active">Koordinaten</button>
<button id="modeMeasure">Messen</button>
</div>

<div id="mapSwitcher" class="ui-box">
<button onclick="switchMap('player')" id="btnPlayer" class="active">Mittelerde</button>
<button onclick="switchMap('gm')" id="btnGM">Gebiete</button>
<button onclick="switchMap('all')" id="btnAll">Alle</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================

const MAPS = {
  player: "https://lh3.googleusercontent.com/d/1ITaHpJQKrllAPfGZrAFKz87NfOff9f8T=s11212",
  gm: "https://lh3.googleusercontent.com/d/1qZPySmQRDEiMgt9D0zWB6tbADWrSx2-S=s11212",
  all: "https://lh3.googleusercontent.com/d/1DLatrrxcqUIF5CCI-BVGVQcg0MrBcseN=s11212"
};

let currentOverlay;

const map = L.map('map', {
  crs:L.CRS.Simple,
  minZoom:-3,
  maxZoom:5,
  zoomControl:true
});

const bounds = [[0,0],[9716,11212]];

function switchMap(key){

  document.querySelectorAll("#mapSwitcher button").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn"+key.charAt(0).toUpperCase()+key.slice(1)).classList.add("active");

  if(currentOverlay){
    map.removeLayer(currentOverlay);
  }

  currentOverlay = L.imageOverlay(MAPS[key], bounds).addTo(map);
}

switchMap("player");
map.fitBounds(bounds);

// ================= ICONS =================

function resolveIcon(icon){
if(!icon) return "📍";
let id = icon.match(/[-\w]{25,}/);
if(id) return "https://drive.google.com/uc?export=view&id="+id[0];
return icon;
}

function isImage(icon){
return icon.startsWith("http");
}

function createMarkerIcon(icon,size){
let r = resolveIcon(icon);

if(isImage(r)){
return L.icon({
iconUrl:r,
iconSize:[size,size],
iconAnchor:[size/2,size]
});
}

return L.divIcon({
html:`<div style="font-size:${size}px">${r}</div>`,
className:""
});
}

// ================= DATA =================

const sheetURL = "https://script.google.com/macros/s/AKfycbwGaaBeERsd4o-nj-aCABwaLsVMEEmuh8ou_-mHJVs33MeXwzgdTC94A0bvNuFXwcKhCQ/exec";

let allMarkers = [];

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

createLegend(data.legend || []);

(data.pois || []).forEach(p=>{

let x=parseFloat(p.X);
let y=parseFloat(p.Y);
if(isNaN(x)||isNaN(y)) return;

let marker=L.marker([y,x],{
icon:createMarkerIcon(p.Icon,p["Markergröße"]||30)
});

marker.bindPopup(`<b>${p.Name}</b><br>${p.Beschreibung||""}`);

allMarkers.push({
marker:marker,
zoom:Number(p["Ab Zoom"])||0
});

});

updateMarkers();
});

// ================= MARKER LOGIK =================

function updateMarkers(){
let z=map.getZoom();

allMarkers.forEach(m=>{
if(z>=m.zoom){
if(!map.hasLayer(m.marker)) m.marker.addTo(map);
}else{
if(map.hasLayer(m.marker)) map.removeLayer(m.marker);
}
});
}

map.on("zoomend",updateMarkers);

// ================= LEGENDE =================

function createLegend(data){

if(!data.length) return;

const control=L.control({position:"bottomleft"});

control.onAdd=function(){

const div=L.DomUtil.create("div","legend-control");

data.forEach(e=>{

const row=document.createElement("div");
row.className="legend-item";

const icon=document.createElement("div");
icon.className="legend-icon";

let r=resolveIcon(e.Icon);

if(isImage(r)){
icon.innerHTML=`<img src="${r}">`;
}else{
icon.innerHTML=r;
}

const text=document.createElement("div");
text.innerText=e.Typ;

row.appendChild(icon);
row.appendChild(text);
div.appendChild(row);

});

return div;
};

control.addTo(map);
}

</script>
</body>
</html>

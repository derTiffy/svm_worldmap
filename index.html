<!DOCTYPE html>
<html>
<head>
  <title>Mittelerde Karte</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 100vh;
      background: #111;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>

// ------------------------
// MAP
// ------------------------

var map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 2
});

// WICHTIG: Höhe, Breite!
var bounds = [[0,0], [6000,7000]];

var image = L.imageOverlay('svm_worldmap/kumu_Mittelerde_small2.jpg', bounds).addTo(map);

map.fitBounds(bounds);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // 🗺️ MAP INIT
  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3,
    maxZoom: 5,
    zoomSnap: 0.25
  });

  // 🖼️ KARTE
  var imageUrl = "https://lh3.googleusercontent.com/d/1RIf4qzz4r2HtjfR_boJsVkiQY4olmhAK=s11212?authuser=0";

  var w = 11212;
  var h = 9716;

  var bounds = [[0, 0], [h, w]];

  L.imageOverlay(imageUrl, bounds).addTo(map);

  map.fitBounds(bounds);
  map.setZoom(-2); // oder -1 / -2.5 je nach Geschmack
  map.setMaxBounds(bounds);

  // =========================
  // 🧭 KOORDINATEN ANZEIGEN
  // =========================

  var coordBox = L.control({position: 'bottomleft'});

  coordBox.onAdd = function () {
    this._div = L.DomUtil.create('div', 'coordBox');
    this._div.style.background = "rgba(0,0,0,0.7)";
    this._div.style.color = "white";
    this._div.style.padding = "6px 10px";
    this._div.style.fontSize = "14px";
    this._div.innerHTML = "Klick auf die Karte";
    return this._div;
  };

  coordBox.addTo(map);

  map.on('click', function(e) {
    var x = Math.round(e.latlng.lng);
    var y = Math.round(e.latlng.lat);

    coordBox._div.innerHTML =
      "X: " + x + " | Y: " + y;
  });

  // =========================
  // 📡 DATEN AUS GOOGLE SHEET (JSON)
  // =========================

  const sheetURL = "https://script.google.com/macros/s/AKfycbwGaaBeERsd4o-nj-aCABwaLsVMEEmuh8ou_-mHJVs33MeXwzgdTC94A0bvNuFXwcKhCQ/exec";

  fetch(sheetURL)
    .then(res => res.json())
    .then(data => {

      data.forEach(row => {

        // 🔒 Nur freigegebene
        if (row.Approved !== true) return;

        const name = row.Name;
        const x = parseFloat(row.X);
        const y = parseFloat(row.Y);
        const typ = row.Typ;
        const beschreibung = row.Beschreibung;
        const wiki = row.Wiki;

        // Sicherheitscheck
        if (!name || isNaN(x) || isNaN(y)) return;

        let popupContent = `<b>${name}</b><br>${beschreibung || ""}`;

        if (wiki) {
          popupContent += `<br><a href="${wiki}" target="_blank">Wiki öffnen</a>`;
        }

        L.marker([y, x]).addTo(map)
          .bindPopup(popupContent);

      });

    })
    .catch(err => console.error("Fehler beim Laden:", err));

</script>

</body>
</html>

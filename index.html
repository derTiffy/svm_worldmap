<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }

    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // 🗺️ Karte initialisieren
  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -5,
    maxZoom: 2,
    zoomSnap: 0.25
  });

  // 📏 Deine echte Bildgröße
  var imageWidth = 11212;
  var imageHeight = 9716;

  // 📦 Bounds korrekt setzen (Leaflet nutzt [y, x])
  var bounds = [[0, 0], [imageHeight, imageWidth]];

  // 🖼️ Dein Google Drive DIRECT LINK
  var imageUrl = "https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg";

  // 🖼️ Bild laden
  var image = L.imageOverlay(imageUrl, bounds).addTo(map);

  // 🔍 Automatisch auf Karte zoomen (wichtig für kleine Screens)
  map.fitBounds(bounds);

  // 🧱 verhindert "wegscrollen" aus der Karte
  map.setMaxBounds(bounds);

  // 📍 Testmarker (optional)
  L.marker([5000, 5000]).addTo(map)
    .bindPopup("Test: Zentrum der Karte");

</script>

</body>
</html>

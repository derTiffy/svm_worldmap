<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // 🗺️ Leaflet Map Setup
  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -2,
    maxZoom: 2,
    zoomSnap: 0.25
  });

  // 🖼️ DEIN BILD AUS GITHUB
  var imageUrl = "https://dertiffy.github.io/svm_worldmap/kumu_Mittelerde_small2.png";

  // ⚠️ WICHTIG: Größe deiner Map (bitte ggf. anpassen!)
  var w = 11212;
  var h = 9716;

  var bounds = [[0, 0], [h, w]];

  // 🖼️ Bild als Overlay
  L.imageOverlay(imageUrl, bounds).addTo(map);

  // 🔍 Startansicht
  map.fitBounds(bounds);

  // 🧱 Begrenzen, damit man nicht “verliert”
  map.setMaxBounds(bounds);

</script>

</body>
</html>

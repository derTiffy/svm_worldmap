<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SVM Worldmap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&display=swap" rel="stylesheet">

<style>

html, body {
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  background:#000;
}

#map {
  height:100vh;
  width:100%;
}

/* MAP SWITCHER */
#mapSwitcher {
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  background:rgba(0,0,0,0.8);
  padding:6px;
  border-radius:6px;
}

#mapSwitcher button {
  margin:3px;
  padding:6px 10px;
  cursor:pointer;
  border:none;
  background:#444;
  color:white;
}

#mapSwitcher button.active {
  background:#4da3ff;
  color:black;
  font-weight:bold;
}

/* SUCHE */
#searchBox {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  width:300px;
}

#searchInput {
  width:100%;
  padding:8px;
}

#suggestions {
  background:white;
  max-height:200px;
  overflow-y:auto;
}

/* INFO */
#infoBox {
  margin-top:5px;
  background:rgba(0,0,0,0.7);
  color:white;
  padding:6px;
}

/* TOOLS */
#toolBox {
  position:absolute;
  top:10px;
  right:10px;
  z-index:1000;
  background:rgba(0,0,0,0.8);
  padding:6px;
}

/* LEGENDE */
.leaflet-control.legend-control {
  color:white;
  font-family:"Eagle Lake", serif;
  font-size:22px;
  line-height:40px;
}

.legend-item {
  display:flex;
  align-items:center;
  gap:10px;
}

.legend-icon {
  width:40px;
  height:40px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.legend-icon img {
  max-width:40px;
  max-height:40px;
}

</style>
</head>

<body>

<div id="searchBox">
<input id="searchInput" placeholder="Ort suchen..." />
<div id="suggestions"></div>
<div id="infoBox">Bereit</div>
</div>

<div id="toolBox">
<button id="modeCoords" class="active">Koordinaten</button>
<button id="modeMeasure">Messen</button>
</div>

<div id="mapSwitcher">
<button onclick="switchMap('player')" id="btnPlayer" class="active">Mittelerde</button>
<button onclick="switchMap('gm')" id="btnGM">Mittelerde - Gebiete</button>
<button onclick="switchMap('all')" id="btnAll">SL-ALL</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// =========================
// MAPS
// =========================

const MAPS = {
  player: "https://lh3.googleusercontent.com/d/1ITaHpJQKrllAPfGZrAFKz87NfOff9f8T=s11212?authuser=0",
  gm: "https://lh3.googleusercontent.com/d/1qZPySmQRDEiMgt9D0zWB6tbADWrSx2-S=s11212?authuser=0",
  all: "https://lh3.googleusercontent.com/d/1DLatrrxcqUIF5CCI-BVGVQcg0MrBcseN=s11212?authuser=0"
};

let currentOverlay;

// =========================
// MAP INIT
// =========================

const map = L.map('map', {
  crs:L.CRS.Simple,
  minZoom:-3,
  maxZoom:5
});

const bounds = [[0,0],[9716,11212]];

function switchMap(key){

  document.querySelectorAll("#mapSwitcher button").forEach(b=>b.classList.remove("active"));

  if(key==="player") btnPlayer.classList.add("active");
  if(key==="gm") btnGM.classList.add("active");
  if(key==="all") btnAll.classList.add("active");

  if(currentOverlay){
    map.removeLayer(currentOverlay);
  }

  currentOverlay = L.imageOverlay(MAPS[key], bounds).addTo(map);

}

switchMap("player");

map.fitBounds(bounds);

// =========================
// ICON SYSTEM
// =========================

function resolveIcon(icon){
if(!icon) return "📍";
let v = String(icon).trim();
if(v.includes("drive.google.com")){
let id = v.match(/[-\w]{25,}/);
if(id) return "https://drive.google.com/uc?export=view&id="+id[0];
}
return v;
}

function isImage(icon){
return icon.startsWith("http");
}

function createMarkerIcon(icon,size){
let resolved = resolveIcon(icon);

if(isImage(resolved)){
return L.icon({
iconUrl:resolved,
iconSize:[size,size],
iconAnchor:[size/2,size]
});
}

return L.divIcon({
html:`<div style="font-size:${size}px">${resolved}</div>`,
className:""
});
}

// =========================
// DATA
// =========================

const sheetURL = "https://script.google.com/macros/s/AKfycbwGaaBeERsd4o-nj-aCABwaLsVMEEmuh8ou_-mHJVs33MeXwzgdTC94A0bvNuFXwcKhCQ/exec";

let allMarkers = [];

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

const pois = data.pois || [];
const legend = data.legend || [];

createMapLegend(legend);

pois.forEach(p=>{

const x = parseFloat(p.X);
const y = parseFloat(p.Y);

if(isNaN(x)||isNaN(y)) return;

let marker = L.marker([y,x],{
icon:createMarkerIcon(p.Icon, p["Markergröße"]||30)
});

marker.bindPopup(`<b>${p.Name}</b><br>${p.Beschreibung||""}`);

allMarkers.push({
marker:marker,
zoom:Number(p["Ab Zoom"])||0
});

});

updateMarkerVisibility();

});

// =========================
// MARKER VISIBILITY
// =========================

function updateMarkerVisibility(){

let z = map.getZoom();

allMarkers.forEach(m=>{
if(z>=m.zoom){
if(!map.hasLayer(m.marker)) m.marker.addTo(map);
}else{
if(map.hasLayer(m.marker)) map.removeLayer(m.marker);
}
});

}

map.on("zoomend", updateMarkerVisibility);

// =========================
// LEGENDE
// =========================

function createMapLegend(legendData){

if(!legendData.length) return;

const control = L.control({position:"topright"});

control.onAdd = function(){

const div = L.DomUtil.create("div","legend-control");

legendData.forEach(e=>{

const item = document.createElement("div");
item.className="legend-item";

const icon = document.createElement("div");
icon.className="legend-icon";

let r = resolveIcon(e.Icon);

if(isImage(r)){
icon.innerHTML=`<img src="${r}">`;
}else{
icon.innerHTML=r;
}

const text = document.createElement("div");
text.innerText=e.Typ;

item.appendChild(icon);
item.appendChild(text);

div.appendChild(item);

});

return div;

};

control.addTo(map);

}

</script>
</body>
</html>

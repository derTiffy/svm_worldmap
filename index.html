<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mittelerde Karte</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black; /* schöner Rand statt abgeschnitten */
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// =========================
// 🗺️ KARTE INITIALISIEREN
// =========================

var map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -3,
  maxZoom: 5,
  zoomSnap: 0.25
});


// =========================
// 🖼️ BILD EINBINDEN
// =========================

var bounds = [[0, 0], [9716, 11212]];

L.imageOverlay('map.jpg', bounds).addTo(map);


// 👉 WICHTIG: komplette Karte anzeigen (automatisch!)
map.fitBounds(bounds, {
  padding: [20, 20],
  animate: false
});


// =========================
// 📍 MARKER LADEN
// =========================

fetch("https://script.google.com/macros/s/AKfycbwGaaBeERsd4o-nj-aCABwaLsVMEEmuh8ou_-mHJVs33MeXwzgdTC94A0bvNuFXwcKhCQ/exec")
  .then(res => res.json())
  .then(data => {

    data.forEach(p => {

      if (!p.X || !p.Y) return;

      let zoomLevel = p["Ab Zoom"] ?? 0;

      function updateMarker() {

        if (map.getZoom() < zoomLevel) {
          if (p._marker) {
            map.removeLayer(p._marker);
            p._marker = null;
          }
          return;
        }

        if (!p._marker) {

          let size = p["Markergröße"] || 30;

          let icon = L.divIcon({
            html: `<div style="font-size:${size}px">${p.Icon || "📍"}</div>`,
            className: ''
          });

          p._marker = L.marker([p.Y, p.X], { icon: icon })
            .bindPopup(`
              <b>${p.Name}</b><br>
              ${p.Beschreibung || ""}<br>
              <a href="${p.Wiki}" target="_blank">Wiki</a>
            `)
            .addTo(map);
        }
      }

      updateMarker();
      map.on("zoomend", updateMarker);

    });

  });

</script>

</body>
</html>

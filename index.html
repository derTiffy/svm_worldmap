<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // 🗺️ MAP INIT
  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3,
    maxZoom: 5,
    zoomSnap: 0.25
  });

  // 🖼️ DEIN BILD
  var imageUrl = "https://lh3.googleusercontent.com/d/1RIf4qzz4r2HtjfR_boJsVkiQY4olmhAK=s11212?authuser=0";

  // 📏 BILDGRÖSSE
  var w = 11212;
  var h = 9716;

  // 🧭 BOUNDS
  var bounds = [[0, 0], [h, w]];

  // 🖼️ OVERLAY
  L.imageOverlay(imageUrl, bounds).addTo(map);

  // 🔍 VIEW FIT
  map.fitBounds(bounds);

  // 🧱 LIMITS
  map.setMaxBounds(bounds);

  // =========================
// 🧭 KOORDINATEN ANZEIGEN
// =========================

var coordBox = L.control({position: 'bottomleft'});

coordBox.onAdd = function () {
  this._div = L.DomUtil.create('div', 'coordBox');
  this._div.style.background = "rgba(0,0,0,0.7)";
  this._div.style.color = "white";
  this._div.style.padding = "6px 10px";
  this._div.style.fontSize = "14px";
  this._div.innerHTML = "Klick auf die Karte";
  return this._div;
};

coordBox.addTo(map);

// Beim Klick Koordinaten anzeigen
map.on('click', function(e) {

  var x = Math.round(e.latlng.lng);
  var y = Math.round(e.latlng.lat);

  coordBox._div.innerHTML =
    "X: " + x + " | Y: " + y;

});


  // =========================
  // 📍 PINS / ORTE
  // =========================

  // 🟢 Einfacher Pin
  L.marker([1200, 1500]).addTo(map)
    .bindPopup("<b>Bree</b><br>Handelsstadt am alten Weg.");

  // 🟢 Pin 2
  L.marker([2500, 4000]).addTo(map)
    .bindPopup("<b>Düsterwald</b><br>Gefährlicher Wald voller Geheimnisse.");

  // 🟢 Pin 3
  L.marker([4500, 3000]).addTo(map)
    .bindPopup("<b>Minas Tirith</b><br>Weiße Stadt Gondors.");

</script>

</body>
</html>

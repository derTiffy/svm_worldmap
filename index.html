<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // 🗺️ Leaflet Map (WICHTIG: CRS.Simple für Bilder)
  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -2,
    maxZoom: 2,
    zoomSnap: 0.25
  });

  // 🖼️ DEIN BILD
  var imageUrl = "https://dertiffy.github.io/svm_worldmap/kumu_Mittelerde_small2.jpg";

  // 📏 DEINE BILDGRÖSSE (7000 x 6000)
  var w = 7000;
  var h = 6000;

  // 🧭 Bounds korrekt setzen (Leaflet Format!)
  var bounds = [[0, 0], [h, w]];

  // 🖼️ Bild als Overlay
  var overlay = L.imageOverlay(imageUrl, bounds).addTo(map);

  // 🔍 Ansicht auf Bild setzen
  map.fitBounds(bounds);

  // 🧱 verhindert „wegscrollen“
  map.setMaxBounds(bounds);

</script>

</body>
</html>

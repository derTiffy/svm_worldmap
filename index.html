<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // 🗺️ MAP INIT
  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -5,
    maxZoom: 5,
    zoomSnap: 0.25
  });

  // 🖼️ DEIN BILD
  var imageUrl = "https://dertiffy.github.io/svm_worldmap/kumu_Mittelerde_small2.jpg";

  // 📏 BILDGRÖSSE
  var w = 7000;
  var h = 6000;

  // 🧭 BOUNDS
  var bounds = [[0, 0], [h, w]];

  // 🖼️ OVERLAY
  L.imageOverlay(imageUrl, bounds).addTo(map);

  // 🔍 VIEW FIT
  map.fitBounds(bounds);

  // 🧱 LIMITS
  map.setMaxBounds(bounds);

  // =========================
  // 📍 PINS / ORTE
  // =========================

  // 🟢 Einfacher Pin
  L.marker([1200, 1500]).addTo(map)
    .bindPopup("<b>Bree</b><br>Handelsstadt am alten Weg.");

  // 🟢 Pin 2
  L.marker([2500, 4000]).addTo(map)
    .bindPopup("<b>Düsterwald</b><br>Gefährlicher Wald voller Geheimnisse.");

  // 🟢 Pin 3
  L.marker([4500, 3000]).addTo(map)
    .bindPopup("<b>Minas Tirith</b><br>Weiße Stadt Gondors.");

</script>

</body>
</html>

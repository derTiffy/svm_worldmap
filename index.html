<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* 🔍 SUCHE */
    #searchBox {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 300px;
    }

    #searchInput {
      width: 100%;
      padding: 8px;
      font-size: 14px;
    }

    #suggestions {
      background: white;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ccc;
    }

    .suggestion-item {
      padding: 6px;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background: #eee;
    }

    /* 📏 MESSBOX */
    #measureBox {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px;
      font-size: 14px;
    }

    /* 🧭 TOOLBOX */
    #toolBox {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.8);
      padding: 6px;
      border-radius: 6px;
    }

    #toolBox button {
      display: block;
      width: 140px;
      margin: 4px 0;
      padding: 6px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- 🔍 SEARCH -->
<div id="searchBox">
  <input id="searchInput" type="text" placeholder="Ort suchen..." />
  <div id="suggestions"></div>
</div>

<!-- 📏 MEASURE -->
<div id="measureBox">
  Strecke: 0 mi / 0 km<br>
  <button id="resetBtn">Zurücksetzen</button>
</div>

<!-- 🧭 TOOL SWITCH -->
<div id="toolBox">
  <button id="modeCoords">Koordinaten</button>
  <button id="modeMeasure">Messen</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // =========================
  // 🗺️ MAP
  // =========================

  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3,
    maxZoom: 5,
    zoomSnap: 0.25
  });

  var imageUrl = "https://lh3.googleusercontent.com/d/1RIf4qzz4r2HtjfR_boJsVkiQY4olmhAK=s11212?authuser=0";

  var w = 11212;
  var h = 9716;

  var bounds = [[0, 0], [h, w]];

  L.imageOverlay(imageUrl, bounds).addTo(map);

  map.fitBounds(bounds);
  map.setZoom(-2);
  map.setMaxBounds(bounds);

  // =========================
  // 🧭 KOORDINATENBOX
  // =========================

  var coordBox = L.control({position: 'bottomleft'});

  coordBox.onAdd = function () {
    this._div = L.DomUtil.create('div', 'coordBox');
    this._div.style.background = "rgba(0,0,0,0.7)";
    this._div.style.color = "white";
    this._div.style.padding = "6px 10px";
    this._div.style.fontSize = "14px";
    this._div.innerHTML = "Klick auf die Karte";
    return this._div;
  };

  coordBox.addTo(map);

  // =========================
  // 🧭 TOOL MODES
  // =========================

  let activeMode = "coords";

  document.getElementById("modeCoords").onclick = () => {
    activeMode = "coords";
    resetMeasure();
  };

  document.getElementById("modeMeasure").onclick = () => {
    activeMode = "measure";
  };

  // =========================
  // 📏 MESS SYSTEM
  // =========================

  const PIXEL_TO_MILES = 150 / 1000;
  const MILES_TO_KM = 1.60934;

  let measurePoints = [];
  let measureLayers = [];
  let totalDistance = 0;

  const measureBox = document.getElementById("measureBox");

  function updateMeasureUI() {
    const km = totalDistance * MILES_TO_KM;

    measureBox.innerHTML = `
      Strecke: ${totalDistance.toFixed(2)} mi / ${km.toFixed(2)} km<br>
      <button id="resetBtn">Zurücksetzen</button>
    `;

    document.getElementById("resetBtn").onclick = resetMeasure;
  }

  function resetMeasure() {
    measurePoints = [];
    totalDistance = 0;

    measureLayers.forEach(l => map.removeLayer(l));
    measureLayers = [];

    updateMeasureUI();
  }

  document.getElementById("resetBtn").onclick = resetMeasure;

  // =========================
  // 🖱️ CLICK ROUTER
  // =========================

  map.on('click', function(e) {

    const x = e.latlng.lng;
    const y = e.latlng.lat;
    const point = [y, x];

    // 🧭 COORD MODE
    if (activeMode === "coords") {
      coordBox._div.innerHTML =
        "X: " + Math.round(x) + " | Y: " + Math.round(y);
      return;
    }

    // 📏 MEASURE MODE
    if (activeMode === "measure") {

      measurePoints.push(point);

      const marker = L.circleMarker(point, {radius: 4}).addTo(map);
      measureLayers.push(marker);

      if (measurePoints.length > 1) {

        const prev = measurePoints[measurePoints.length - 2];

        const dx = point[1] - prev[1];
        const dy = point[0] - prev[0];

        const pixelDist = Math.sqrt(dx*dx + dy*dy);
        const miles = pixelDist * PIXEL_TO_MILES;

        totalDistance += miles;

        const line = L.polyline([prev, point]).addTo(map);
        measureLayers.push(line);
      }

      updateMeasureUI();
    }

  });

  updateMeasureUI();

  // =========================
  // 📡 GOOGLE SHEET DATA
  // =========================

  const sheetURL = "https://script.google.com/macros/s/AKfycbwGaaBeERsd4o-nj-aCABwaLsVMEEmuh8ou_-mHJVs33MeXwzgdTC94A0bvNuFXwcKhCQ/exec";

  let allMarkers = [];

  fetch(sheetURL)
    .then(res => res.json())
    .then(data => {

      data.forEach(row => {

        if (String(row.Approved).toLowerCase() !== "true") return;

        const name = row.Name;
        const x = parseFloat(row.X);
        const y = parseFloat(row.Y);
        const beschreibung = row.Beschreibung;
        const wiki = row.Wiki;

        if (!name || isNaN(x) || isNaN(y)) return;

        let popup = `<b>${name}</b><br>${beschreibung || ""}`;

        if (wiki) {
          popup += `<br><a href="${wiki}" target="_blank">Wiki öffnen</a>`;
        }

        const marker = L.marker([y, x]).addTo(map)
          .bindPopup(popup);

        allMarkers.push({
          name,
          marker,
          x,
          y
        });

      });

    });

  // =========================
  // 🔍 SEARCH
  // =========================

  const input = document.getElementById("searchInput");
  const suggestions = document.getElementById("suggestions");

  input.addEventListener("input", function() {

    const value = input.value.toLowerCase();
    suggestions.innerHTML = "";

    if (!value) return;

    const matches = allMarkers.filter(m =>
      m.name.toLowerCase().includes(value)
    );

    matches.slice(0, 10).forEach(m => {

      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.textContent = m.name;

      div.onclick = () => {
        map.setView([m.y, m.x], 1);
        m.marker.openPopup();
        suggestions.innerHTML = "";
        input.value = m.name;
      };

      suggestions.appendChild(div);
    });

  });

</script>

</body>
</html>

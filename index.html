<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // 🗺️ Map Setup (wichtig: CRS.Simple für Bilder)
  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3,
    maxZoom: 2,
    zoomSnap: 0.25,
    zoomControl: true
  });

  // 📏 Bildgröße (deine Originalkarte)
  var w = 11212;
  var h = 9716;

  // 📦 Bounds korrekt setzen
  var southWest = map.unproject([0, h], map.getMaxZoom());
  var northEast = map.unproject([w, 0], map.getMaxZoom());
  var bounds = new L.LatLngBounds(southWest, northEast);

  // 🖼️ Bild (MapTiler oder lokales Bild möglich)
  var imageUrl = "https://drive.usercontent.google.com/download?id=1RIf4qzz4r2HtjfR_boJsVkiQY4olmhAK";

  var overlay = L.imageOverlay(imageUrl, bounds).addTo(map);

  // 🔍 WICHTIG: Startansicht korrekt setzen
  map.fitBounds(bounds);

  // 🧱 verhindert „leere Welt außerhalb der Karte“
  map.setMaxBounds(bounds);

  // 🚫 verhindert extremes rauszoomen (Fix für dein Problem)
  map.options.minZoom = -2;

  // 📍 Testmarker
  L.marker([0, 0]).addTo(map)
    .bindPopup("Startpunkt");

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }

    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // 🧠 1. Map initialisieren (Pixel-Koordinaten-System)
  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: 0,
    maxZoom: 6,
    zoomSnap: 0.25,
    zoomControl: true
  });

  // 🗺️ 2. Originalbildgröße (wichtig für Bounds!)
  var imageWidth = 11212;
  var imageHeight = 9716;

  // 📦 3. Bounds (Leaflet nutzt [y, x]!)
  var southWest = map.unproject([0, imageHeight], map.getMaxZoom());
  var northEast = map.unproject([imageWidth, 0], map.getMaxZoom());
  var bounds = new L.LatLngBounds(southWest, northEast);

  // 🧩 4. Tile Layer (MapTiler XYZ)
  var tileUrl = "https://api.maptiler.com/images/019f1836-d777-75f0-8d8e-9f18ceb0e263/{z}/{x}/{y}?key=iat7fGL5ew2cepuCfp3Z";

  L.tileLayer(tileUrl, {
    tileSize: 256,
    minZoom: 0,
    maxZoom: 6,
    noWrap: true,
    bounds: bounds,
    attribution: "Fantasy Map"
  }).addTo(map);

  // 🔍 5. Auto-Zoom auf ganze Karte
  map.fitBounds(bounds);

  // 🧱 6. Begrenzen (kein raus-scrollen)
  map.setMaxBounds(bounds);

  // 📍 7. Testmarker (optional)
  L.marker([0, 0]).addTo(map)
    .bindPopup("Origin");

</script>

</body>
</html>

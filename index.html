<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SVM Worldmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* 🔍 SEARCH */
    #searchBox {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 300px;
    }

    #searchInput {
      width: 100%;
      padding: 8px;
      font-size: 14px;
    }

    #suggestions {
      background: white;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ccc;
    }

    .suggestion-item {
      padding: 6px;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background: #eee;
    }

    /* 🧭 INFO BOX (Koordinaten + ggf. Status) */
    #infoBox {
      margin-top: 5px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      font-size: 13px;
    }

    /* 📏 MEASURE BOX */
    #measureBox {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 8px;
      font-size: 14px;
      display: none;
    }

    /* 🧭 TOOLBOX */
    #toolBox {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.8);
      padding: 6px;
      border-radius: 6px;
    }

    #toolBox button {
      display: block;
      width: 140px;
      margin: 4px 0;
      padding: 6px;
      cursor: pointer;
      border: none;
      color: white;
      background: #444;
    }

    #toolBox button.active {
      background: #4da3ff;
      color: black;
      font-weight: bold;
    }

  </style>
</head>

<body>

<!-- 🔍 SEARCH -->
<div id="searchBox">
  <input id="searchInput" type="text" placeholder="Ort suchen..." />
  <div id="suggestions"></div>
  <div id="infoBox">Bereit</div>
</div>

<!-- 📏 MEASURE -->
<div id="measureBox">
  Strecke: 0 mi / 0 km<br>
  <button id="resetBtn">Zurücksetzen</button>
</div>

<!-- 🧭 TOOLBOX -->
<div id="toolBox">
  <button id="modeCoords" class="active">Koordinaten</button>
  <button id="modeMeasure">Messen</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // =========================
  // 🗺️ MAP
  // =========================

  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3,
    maxZoom: 5,
    zoomSnap: 0.25
  });

  var imageUrl = "https://lh3.googleusercontent.com/d/1RIf4qzz4r2HtjfR_boJsVkiQY4olmhAK=s11212?authuser=0";

  var w = 11212;
  var h = 9716;

  var bounds = [[0, 0], [h, w]];

  L.imageOverlay(imageUrl, bounds).addTo(map);

  map.fitBounds(bounds);
  map.setZoom(-2);
  map.setMaxBounds(bounds);

  // =========================
  // 🧭 TOOL STATE
  // =========================

  let activeMode = "coords";

  const modeCoordsBtn = document.getElementById("modeCoords");
  const modeMeasureBtn = document.getElementById("modeMeasure");

  function setMode(mode) {
    activeMode = mode;

    modeCoordsBtn.classList.remove("active");
    modeMeasureBtn.classList.remove("active");

    if (mode === "coords") {
      modeCoordsBtn.classList.add("active");
      document.getElementById("measureBox").style.display = "none";
    }

    if (mode === "measure") {
      modeMeasureBtn.classList.add("active");
      document.getElementById("measureBox").style.display = "block";
    }
  }

  modeCoordsBtn.onclick = () => setMode("coords");
  modeMeasureBtn.onclick = () => setMode("measure");

  setMode("coords");

  // =========================
  // 📏 MEASURE SYSTEM
  // =========================

  const PIXEL_TO_MILES = 150 / 9676;
  const MILES_TO_KM = 1.60934;

  let measurePoints = [];
  let measureLayers = [];
  let totalDistance = 0;

  const measureBox = document.getElementById("measureBox");

  function updateMeasureUI() {
    const km = totalDistance * MILES_TO_KM;

    measureBox.innerHTML = `
      Strecke: ${totalDistance.toFixed(2)} mi / ${km.toFixed(2)} km<br>
      <button id="resetBtn">Zurücksetzen</button>
    `;

    document.getElementById("resetBtn").onclick = resetMeasure;
  }

  function resetMeasure() {
    measurePoints = [];
    totalDistance = 0;

    measureLayers.forEach(l => map.removeLayer(l));
    measureLayers = [];

    updateMeasureUI();
  }

  document.getElementById("resetBtn").onclick = resetMeasure;

  // =========================
  // 🖱️ MAP CLICK
  // =========================

  const infoBox = document.getElementById("infoBox");

  map.on('click', function(e) {

    const x = e.latlng.lng;
    const y = e.latlng.lat;
    const point = [y, x];

    // 🧭 COORD MODE
    if (activeMode === "coords") {
      infoBox.innerHTML = "X: " + Math.round(x) + " | Y: " + Math.round(y);
      return;
    }

    // 📏 MEASURE MODE
    if (activeMode === "measure") {

      measurePoints.push(point);

      const marker = L.circleMarker(point, {radius: 4}).addTo(map);
      measureLayers.push(marker);

      if (measurePoints.length > 1) {

        const prev = measurePoints[measurePoints.length - 2];

        const dx = point[1] - prev[1];
        const dy = point[0] - prev[0];

        const pixelDist = Math.sqrt(dx*dx + dy*dy);
        const miles = pixelDist * PIXEL_TO_MILES;

        totalDistance += miles;

        const line = L.polyline([prev, point]).addTo(map);
        measureLayers.push(line);
      }

      updateMeasureUI();
    }

  });

  // =========================
  // 📡 GOOGLE SHEET
  // =========================

  const sheetURL = "https://script.google.com/macros/s/AKfycbwGaaBeERsd4o-nj-aCABwaLsVMEEmuh8ou_-mHJVs33MeXwzgdTC94A0bvNuFXwcKhCQ/exec";

  let allMarkers = [];

  fetch(sheetURL)
    .then(res => res.json())
    .then(data => {

      data.forEach(row => {

        if (String(row.Approved).toLowerCase() !== "true") return;

        const name = row.Name;
        const x = parseFloat(row.X);
        const y = parseFloat(row.Y);
        const beschreibung = row.Beschreibung;
        const wiki = row.Wiki;

        if (!name || isNaN(x) || isNaN(y)) return;

        let popup = `<b>${name}</b><br>${beschreibung || ""}`;

        if (wiki) {
          popup += `<br><a href="${wiki}" target="_blank">Wiki öffnen</a>`;
        }

        const marker = L.marker([y, x]).addTo(map)
          .bindPopup(popup);

        allMarkers.push({ name, marker, x, y });

      });

    });

  // =========================
  // 🔍 SEARCH + ENTER LOGIC
  // =========================

  const input = document.getElementById("searchInput");
  const suggestions = document.getElementById("suggestions");

  function goToMarker(name) {

    const match = allMarkers.find(m =>
      m.name.toLowerCase() === name.toLowerCase()
    );

    if (match) {
      map.setView([match.y, match.x], 1);
      match.marker.openPopup();
      infoBox.innerHTML = "Gefunden: " + match.name;
      return true;
    }

    infoBox.innerHTML = "❌ Nicht vorhanden";
    return false;
  }

  input.addEventListener("input", function() {

    const value = input.value.toLowerCase();
    suggestions.innerHTML = "";

    if (!value) return;

    const matches = allMarkers.filter(m =>
      m.name.toLowerCase().includes(value)
    );

    matches.slice(0, 10).forEach(m => {

      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.textContent = m.name;

      div.onclick = () => {
        goToMarker(m.name);
        suggestions.innerHTML = "";
        input.value = m.name;
      };

      suggestions.appendChild(div);
    });

  });

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      goToMarker(input.value);
      suggestions.innerHTML = "";
    }
  });

</script>

</body>
</html>
